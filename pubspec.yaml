name: mocard
description: "默记 - 考研复习卡牌应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 路由
  go_router: ^14.2.0

  # 本地数据库
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # 工具
  uuid: ^4.4.0
  intl: ^0.19.0
  path_provider: ^2.1.3
  path: ^1.9.0
  image_picker: ^1.1.2

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true

  # 如果要使用自定义中文字体，取消下方注释并放入字体文件
  # 不配置字体时应用使用系统默认字体，也完全可以正常运行
  # fonts:
  #   - family: NotoSansSC
  #     fonts:
  #       - asset: assets/fonts/NotoSansSC-Regular.otf
  #         weight: 400
  #       - asset: assets/fonts/NotoSansSC-Medium.otf
  #         weight: 500
  #       - asset: assets/fonts/NotoSansSC-Bold.otf
  #         weight: 600
